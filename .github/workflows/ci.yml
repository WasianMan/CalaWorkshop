name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  helper:
    name: helper (fmt / clippy / check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: helper
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: helper
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo check

  package:
    name: package extension (.c7s.zip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build archive
        run: bash packaging/build-c7s.sh
      - uses: actions/upload-artifact@v4
        with:
          name: calaworkshop-extension
          path: dist/*.c7s.zip
          if-no-files-found: error
