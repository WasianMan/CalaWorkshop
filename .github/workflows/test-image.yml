name: test image

on:
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'test/**'
      - 'alpha/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: test-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  helper-image:
    name: build & push helper test image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/calaworkshop-helper
          tags: |
            type=ref,event=branch,prefix=branch-
            type=sha,prefix=sha-,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./helper
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  extension-package:
    name: build extension test package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build archive
        run: bash packaging/build-c7s.sh

      - uses: actions/upload-artifact@v4
        with:
          name: calaworkshop-extension-test
          path: dist/*.c7s.zip
          if-no-files-found: error
